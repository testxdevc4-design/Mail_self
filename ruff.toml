# ruff.toml – MailGuard linting configuration

line-length = 100
target-version = "py312"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
    "PLC", # pylint conventions
    "PLW", # pylint warnings
    "RUF", # ruff-specific rules
    "ANN", # flake8-annotations
    "BLE", # flake8-blind-except
]

ignore = [
    "S101",   # assert statements (used in tests)
    "ANN401", # Dynamically typed expressions (Any) are disallowed
    "B008",   # Do not perform function calls in default arguments (FastAPI Depends)
    "S701",   # Jinja2 autoescape - we handle this explicitly in the worker task
    "BLE001", # blind Exception catches are intentional for resilience in DB/SMTP/bot ops
    "S110",   # try-except-pass used for non-critical fire-and-forget operations
]

[lint.per-file-ignores]
"tests/*" = ["S101", "ANN", "PLW", "PLC"]
"apps/bot/*" = ["ANN"]   # PTB handlers have complex type signatures

[lint.isort]
known-first-party = ["core", "apps"]
